name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build core
        run: cd packages/core && bunx tsc -b

      - name: Build dashboard
        run: cd packages/dashboard && bun run build

      - name: Build adapters
        run: |
          cd packages/express && bunx tsc -b
          cd ../../packages/nestjs && bunx tsc -b
          cd ../../packages/fastify && bunx tsc -b

      - name: Run tests
        run: bun test packages/core/src/test

      - name: Typecheck
        run: bunx tsc -b

      - name: Publish @reqlog/core
        run: cd packages/core && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @reqlog/express
        run: cd packages/express && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @reqlog/fastify
        run: cd packages/fastify && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @reqlog/nestjs
        run: cd packages/nestjs && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git tag
        run: |
          git tag v${{ inputs.version }}
          git push origin v${{ inputs.version }}
