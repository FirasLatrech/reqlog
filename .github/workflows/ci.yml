name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build core
        run: cd packages/core && bun run build

      - name: Build dashboard
        run: cd packages/dashboard && bun run build

      - name: Build adapters
        run: |
          cd packages/express && bun run build
          cd ../../packages/nestjs && bun run build
          cd ../../packages/fastify && bun run build

      - name: Run tests with coverage
        run: bun test --coverage packages/core/src/test packages/express/src/test packages/fastify/src/test

      - name: Typecheck root
        run: bunx tsc -b
